<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WiccapediaGrimoire</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
    />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="WiccapediaGrimoire.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <script type="importmap"></script>
  </head>

  <body>
    <div id="app">
      <div class="app-loader" role="status" aria-live="polite">
        <div class="app-loader__spinner" aria-hidden="true"></div>
        <p class="app-loader__title">Wiccapedia Grimoire</p>
        <p class="app-loader__subtitle">Summoning your grimoire…</p>
      </div>
    </div>

    <div id="blazor-error-ui">
      An unhandled error has occurred.
      <a href="." class="reload">Reload</a>
      <span class="dismiss">🗙</span>
    </div>
    <script src="_content/Microsoft.AspNetCore.Components.WebAssembly.Authentication/AuthenticationService.js"></script>
    <script
      src="_framework/blazor.webassembly#[.{fingerprint}].js"
      autostart="false"
    ></script>
    <script>
      window.wiccapediaAuth = {
        getIdToken: (authority, clientId) => {
          const normalize = (value) => (value || "").replace(/\/+$/, "");
          const targetKey = `oidc.user:${normalize(authority)}:${clientId}`;

          const parseToken = (raw) => {
            if (!raw) {
              return null;
            }

            try {
              const parsed = JSON.parse(raw);
              if (parsed && parsed.id_token) {
                return parsed.id_token;
              }
            } catch {
              return null;
            }

            return null;
          };

          const fromTargetSession = parseToken(
            sessionStorage.getItem(targetKey),
          );
          if (fromTargetSession) {
            return fromTargetSession;
          }

          const fromTargetLocal = parseToken(localStorage.getItem(targetKey));
          if (fromTargetLocal) {
            return fromTargetLocal;
          }

          const fromPrefixSession = Object.keys(sessionStorage)
            .filter((key) => key.startsWith("oidc.user:"))
            .map((key) => parseToken(sessionStorage.getItem(key)))
            .find((token) => !!token);

          if (fromPrefixSession) {
            return fromPrefixSession;
          }

          const fromPrefixLocal = Object.keys(localStorage)
            .filter((key) => key.startsWith("oidc.user:"))
            .map((key) => parseToken(localStorage.getItem(key)))
            .find((token) => !!token);

          return fromPrefixLocal || null;
        },
      };

      const isLocalhost =
        window.location.hostname === "localhost" ||
        window.location.hostname === "127.0.0.1" ||
        window.location.hostname === "::1";

      if (!isLocalhost && "serviceWorker" in navigator) {
        navigator.serviceWorker.register("service-worker.js", {
          updateViaCache: "none",
        });
      }

      Blazor.start();
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
  </body>
</html>
